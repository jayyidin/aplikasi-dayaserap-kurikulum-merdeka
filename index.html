<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aplikasi Daya Serap Kurikulum Merdeka (EduRapor IKM)" />
    <meta name="theme-color" content="#ffffff" />
    <title>EduRapor IKM</title>
    
    <!-- Mencegah kilatan putih (FOUC) sebelum React dimuat -->
    <script>
      if (localStorage.getItem('edurapor_theme') === 'dark' || (!('edurapor_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body>
    <!-- Di sinilah aplikasi React kita akan dimunculkan -->
    <div id="root"></div>
    
    <!-- Ini script untuk menghubungkan HTML dengan React -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
